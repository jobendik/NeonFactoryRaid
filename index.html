<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>Neon Factory Raid</title>
  <!-- CrazyGames SDK v3. Optional at runtime — SDKBridge falls back to a
       stub when window.CrazyGames is unavailable (e.g. local dev). -->
  <script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(ellipse at 25% 25%, rgba(34, 246, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 75% 75%, rgba(167, 108, 255, 0.05) 0%, transparent 50%),
        #03060b;
      overflow: hidden;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    #game {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
    }
    /* M22 — HTML preloader shown before Phaser scenes start. Removed by
       BootScene once the asset load + save migration is complete. */
    #nfr-preload {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse at center, rgba(34, 246, 255, 0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 20% 30%, rgba(167, 108, 255, 0.07) 0%, transparent 50%),
        #03060b;
      color: #22f6ff;
      font-family: monospace, "Courier New", Courier;
      z-index: 9999;
      transition: opacity 0.4s ease-out;
    }
    #nfr-preload::before {
      /* Scanline effect over the preloader for instant retro-cyberpunk read. */
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(34, 246, 255, 0.04) 0,
        rgba(34, 246, 255, 0.04) 1px,
        transparent 1px,
        transparent 3px
      );
    }
    #nfr-preload.fading {
      opacity: 0;
      pointer-events: none;
    }
    #nfr-preload-title {
      font-size: clamp(28px, 6vw, 56px);
      font-weight: 700;
      letter-spacing: 0.18em;
      text-shadow:
        0 0 6px rgba(34, 246, 255, 0.95),
        0 0 18px rgba(34, 246, 255, 0.75),
        0 0 36px rgba(34, 246, 255, 0.45),
        0 0 60px rgba(167, 108, 255, 0.35);
      margin: 0 0 32px 0;
      animation: nfr-title-pulse 2.4s ease-in-out infinite;
    }
    @keyframes nfr-title-pulse {
      0%, 100% { filter: brightness(1); }
      50%      { filter: brightness(1.25); }
    }
    #nfr-preload-bar {
      width: clamp(220px, 50vw, 420px);
      height: 10px;
      background: rgba(34, 246, 255, 0.12);
      border: 1px solid rgba(34, 246, 255, 0.6);
      overflow: hidden;
    }
    #nfr-preload-bar-fill {
      height: 100%;
      width: 0%;
      background: #22f6ff;
      box-shadow: 0 0 12px rgba(34, 246, 255, 0.85);
      transition: width 0.25s ease-out;
    }
    #nfr-preload-status {
      margin-top: 12px;
      font-size: 11px;
      color: rgba(34, 246, 255, 0.6);
      letter-spacing: 0.2em;
    }
  </style>
</head>
<body>
  <div id="nfr-preload">
    <h1 id="nfr-preload-title">NEON FACTORY RAID</h1>
    <div id="nfr-preload-bar"><div id="nfr-preload-bar-fill"></div></div>
    <div id="nfr-preload-status">LOADING&hellip;</div>
  </div>
  <div id="game"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
